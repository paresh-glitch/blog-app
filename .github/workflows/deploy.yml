name: deploy
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main, dev]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      ENV_NAME: ${{ github.event.workflow_run.head_branch == 'main' && 'prod' || 'dev' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: download task def
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ENV_NAME }}-task \
            --query taskDefinition > task-definition.json

      - name: Update node image in task definition
        id: node-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: node_app
          image: ${{ vars.ECR_REGISTRY }}/${{ env.ENV_NAME }}-app:${{ github.event.workflow_run.head_sha }}

      - name: Update Nginx image in task definition
        id: nginx-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.node-task-def.outputs.task-definition }}
          container-name: nginx
          image: ${{ vars.ECR_REGISTRY }}/${{ env.ENV_NAME }}-nginx:${{ github.event.workflow_run.head_sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.nginx-task-def.outputs.task-definition }}
          service: ${{ env.ENV_NAME }}-service
          cluster: ${{ env.ENV_NAME }}-cluster
          wait-for-service-stability: true
