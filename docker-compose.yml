services:
  mongo:
    image: mongo:6
    container_name: db
    volumes:
      - mongo-data:/data/db  # persist data between restarts
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: node_app
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy

  nginx:
    build: ./nginx/
    container_name: proxy
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  mongo-data:



